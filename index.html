<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TopTools365 - 무료 계산기 · 변환기 · 생활 툴 모음</title>
<meta name="description" content="대출계산기, 퇴직금계산기 등 일상에서 필요한 계산기를 무료로 제공합니다.">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8f7f4;
    --card: #ffffff;
    --border: #e2e0d8;
    --text: #1a1a18;
    --muted: #6b6b66;
    --accent: #1a6b4a;
    --radius: 16px;
  }
  @media(prefers-color-scheme:dark) {
    :root { --bg:#1a1a18; --card:#242422; --border:#3a3a36; --text:#f0efe8; --muted:#9a9a92; --accent:#2daa72; }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .wrap { max-width: 800px; margin: 0 auto; padding: 60px 16px 80px; }
  .hero { text-align: center; margin-bottom: 56px; }
  .hero h1 { font-size: 42px; font-weight: 800; letter-spacing: -1px; margin-bottom: 12px; }
  .hero h1 span { color: var(--accent); }
  .hero p { font-size: 16px; color: var(--muted); }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
  .tool-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    text-decoration: none;
    color: var(--text);
    transition: transform .15s, box-shadow .15s;
    display: block;
  }
  .tool-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
  .tool-icon { font-size: 32px; margin-bottom: 12px; }
  .tool-name { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
  .tool-desc { font-size: 13px; color: var(--muted); line-height: 1.5; }
  .tag { display: inline-block; margin-top: 12px; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; background: var(--bg); border: 1px solid var(--border); color: var(--muted); }
  footer { text-align: center; font-size: 12px; color: var(--muted); margin-top: 60px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <h1>Top<span>Tools</span>365</h1>
    <p>일상에서 필요한 계산기를 무료로 제공합니다</p>
  </div>

  <div class="grid">
    <a class="tool-card" href="/loan-calculator/">
      <div class="tool-icon">🏦</div>
      <div class="tool-name">대출 이자 계산기</div>
      <div class="tool-desc">원리금균등·원금균등·만기일시 상환 방식별 월 상환금과 총 이자를 즉시 계산</div>
      <span class="tag">금융</span>
    </a>
    <a class="tool-card" href="/severance-pay/">
      <div class="tool-icon">💼</div>
      <div class="tool-name">퇴직금 계산기</div>
      <div class="tool-desc">입사일·퇴사일·임금 입력만으로 법정 퇴직금을 즉시 계산. 근속연수 자동 산출</div>
      <span class="tag">금융</span>
    </a>
    <!-- 툴 추가할 때마다 여기에 카드 복붙 -->
  </div>

  <footer>© 2025 TopTools365 · 무료 온라인 계산기</footer>
</div>
</body>
</html>
